services:
  - type: web
    name: floodsight-api
    env: python
    region: singapore
    plan: free
    rootDir: flood-risk-demo/backend
    buildCommand: pip install -r requirements-lite.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
